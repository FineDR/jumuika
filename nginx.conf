server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    types {
        application/manifest+json webmanifest;
    }
    default_type application/octet-stream;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/manifest+json;
    gzip_disable "MSIE [1-6]\.";

    # Explicitly handle assets folder
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
        try_files $uri =404;
    }

    # Explicitly allow Service Worker and manifest files
    location ~* (sw\.js|registerSW\.js|manifest\.webmanifest|manifest\.json)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
        try_files $uri =404;
    }

    # Handle other static files at root
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        # $uri/  → serves dist/nyumbani/index.html for /nyumbani (SEO pre-rendered)
        # final fallback → /index.html for all SPA routes (/app/*, etc.)
        try_files $uri $uri/ /index.html;
    }
}
